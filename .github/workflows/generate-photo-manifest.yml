name: Generate manifests

on:
  push:
    paths:
      - 'images/photo/**'
      - 'sounds/music/unreleased/**'

jobs:
  manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifests
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            const IMAGE_EXTS = ['.jpg', '.jpeg', '.png', '.gif', '.webp'];
            function listFiles(dir, exts) {
              return fs.readdirSync(dir)
                .filter(f => exts.includes(path.extname(f).toLowerCase()))
                .sort();
            }

            // photo manifest
            const photos = listFiles('images/photo', IMAGE_EXTS);
            const wallpapers = listFiles('images/photo/wallpapers', IMAGE_EXTS);
            fs.writeFileSync('images/photo/manifest.json', JSON.stringify({ photos, wallpapers }, null, 2) + '\n');
            console.log('photos:', photos.length, '| wallpapers:', wallpapers.length);

            // music manifest
            const sgmt_demos = listFiles('sounds/music/unreleased/segmentation', ['.mp3']);
            const heel2_demos = listFiles('sounds/music/unreleased/heel2', ['.mp3']);
            fs.writeFileSync('sounds/music/manifest.json', JSON.stringify({ sgmt_demos, heel2_demos }, null, 2) + '\n');
            console.log('sgmt_demos:', sgmt_demos.length, '| heel2_demos:', heel2_demos.length);
          "

      - name: Commit manifests
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add images/photo/manifest.json sounds/music/manifest.json
          git diff --staged --quiet || git commit -m "chore: update manifests"
          git push
