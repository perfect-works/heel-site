name: Generate photo manifest

on:
  push:
    paths:
      - 'images/photo/**'

jobs:
  manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest.json
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const IMAGE_EXTS = ['.jpg', '.jpeg', '.png', '.gif', '.webp'];
            function listImages(dir) {
              return fs.readdirSync(dir)
                .filter(f => IMAGE_EXTS.includes(path.extname(f).toLowerCase()))
                .sort();
            }
            const photos = listImages('images/photo');
            const wallpapers = listImages('images/photo/wallpapers');
            fs.writeFileSync('images/photo/manifest.json', JSON.stringify({ photos, wallpapers }, null, 2) + '\n');
            console.log('photos:', photos.length, '| wallpapers:', wallpapers.length);
          "

      - name: Commit manifest
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add images/photo/manifest.json
          git diff --staged --quiet || git commit -m "chore: update photo manifest"
          git push
